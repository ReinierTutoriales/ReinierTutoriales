name: Generate GitHub Stats

on:
  schedule:
    - cron: "0 */6 * * *"   # cada 6 horas
  workflow_dispatch:          # ejecución manual desde Actions

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: GitHub Stats Card
        uses: anuraghazra/github-readme-stats@latest
        with:
          username: ReinierTutoriales
          actions_token: ${{ secrets.GITHUB_TOKEN }}
          output_folder: generated

      - name: Commit generated files
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add generated/
          git diff --quiet && git diff --staged --quiet || git commit -m "chore: update stats cards [skip ci]"
          git push
